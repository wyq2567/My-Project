# Tomcat
server:
  port: 8081

# Spring
spring: 
  application:
    # 应用名称
    name: ruoyi-product
  profiles:
    # 环境配置
    active: dev
  cloud:
    nacos:
      discovery:
        # 服务注册地址
        server-addr: 49.233.123.243:8848
        username: nacos
        password: nacos
      config:
        # 配置中心地址
        server-addr: 49.233.123.243:8848
        username: nacos
        password: nacos
  config:
    # 配置文件格式
    file-extension: yml
    import:
      - nacos:application-${spring.profiles.active}.${spring.config.file-extension}
      - nacos:${spring.application.name}-${spring.profiles.active}.${spring.config.file-extension}
